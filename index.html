<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Company Portal | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
  </style>
</head>

<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-200">
    <div class="text-center mb-8">
      <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
        <i class="fas fa-shield-alt text-white text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-800">Company Portal</h2>
      <p class="text-slate-500 text-sm mt-1">กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ</p>
    </div>

    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">ชื่อผู้ใช้งาน</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-user text-sm"></i>
          </span>
          <input type="text" id="username" 
                 class="block w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" 
                 placeholder="Username">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1 ml-1">รหัสผ่าน</label>
        <div class="relative">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
            <i class="fas fa-lock text-sm"></i>
          </span>
          <input type="password" id="password" 
                 class="block w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" 
                 placeholder="Password">
        </div>
      </div>

      <button onclick="login()" id="loginBtn"
              class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all flex items-center justify-center shadow-md shadow-blue-100">
        <span id="btnText">เข้าสู่ระบบ</span>
      </button>
    </div>

    <div id="result" class="mt-6 text-center text-sm font-medium min-h-[20px]"></div>
  </div>

<script>
// ตรวจสอบ Session [cite: 3]
const currentUser = localStorage.getItem("user");
if(currentUser){
  window.location.href = "dashboard.html";
}

const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

async function login(){
  const username = document.getElementById("username").value.trim(); // ตัดช่องว่าง 
  const password = document.getElementById("password").value.trim();
  const loginBtn = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  const result = document.getElementById("result");

  if(!username || !password){
    showMsg("กรุณากรอก Username และ Password", "text-red-500 bg-red-50 p-2 rounded-lg");
    return;
  }

  // แสดงสถานะกำลังโหลดและปิดปุ่มป้องกันการกดซ้ำ 
  loginBtn.disabled = true;
  btnText.innerHTML = '<i class="fas fa-circle-notch animate-spin mr-2"></i> กำลังตรวจสอบ...';
  result.innerText = "";

  try{
    const response = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({
        action:"login",
        username: username,
        password: password
      })
    });

    const data = await response.json();

    if(data.success){
      showMsg("เข้าสู่ระบบสำเร็จ!", "text-green-600 bg-green-50 p-2 rounded-lg");
      localStorage.setItem("user", JSON.stringify(data.user));
      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);
    } else {
      showMsg(data.message || "ข้อมูลไม่ถูกต้อง", "text-red-500 bg-red-50 p-2 rounded-lg");
      resetBtn();
    }

  }catch(error){
    console.error(error);
    showMsg("เกิดข้อผิดพลาดในการเชื่อมต่อ", "text-red-500 bg-red-50 p-2 rounded-lg");
    resetBtn();
  }
}

function showMsg(msg, classes) {
  const result = document.getElementById("result");
  result.innerText = msg;
  result.className = `mt-6 text-center text-sm font-medium ${classes}`;
}

function resetBtn() {
  const loginBtn = document.getElementById("loginBtn");
  const btnText = document.getElementById("btnText");
  loginBtn.disabled = false;
  btnText.innerText = "เข้าสู่ระบบ";
}
</script>

</body>
</html>
