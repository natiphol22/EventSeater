<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', 'Kanit', sans-serif;
      background-color: #fbfbfd; /* Apple-style off-white */
    }
    .input-flat {
      transition: all 0.2s ease-in-out;
      border: 1px solid #d2d2d7;
    }
    .input-flat:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }
    /* เรียบแต่ลื่นไหล */
    .loader-dot {
      width: 6px;
      height: 6px;
      background: white;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.4s infinite ease-in-out both;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }
  </style>
</head>

<body class="h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-[380px] animate-in fade-in duration-700">
    
    <div class="text-center mb-12">
      <img src="LOGO.png" alt="Company Logo" class="h-20 mx-auto mb-6 object-contain" onerror="this.style.display='none';">
      <h1 class="text-[24px] font-semibold text-[#1d1d1f] tracking-tight">เข้าสู่ระบบ</h1>
      <p class="text-[#86868b] text-[14px] mt-2">กรอกข้อมูลเพื่อเข้าใช้งานระบบ</p>
    </div>

    <div class="space-y-4">
      <div class="space-y-1.5">
        <input type="text" id="username" 
               class="input-flat w-full px-4 py-3 rounded-xl bg-white text-[#1d1d1f] outline-none placeholder:text-[#86868b]" 
               placeholder="ชื่อผู้ใช้งาน">
      </div>

      <div class="space-y-1.5">
        <input type="password" id="password" 
               class="input-flat w-full px-4 py-3 rounded-xl bg-white text-[#1d1d1f] outline-none placeholder:text-[#86868b]" 
               placeholder="รหัสผ่าน">
      </div>

      <button onclick="handleLogin()" id="loginBtn"
              class="w-full bg-[#0071e3] text-white font-medium py-3 rounded-xl hover:bg-[#0077ed] active:scale-[0.98] transition-all flex items-center justify-center mt-6 h-[48px]">
        <span id="btnText">ดำเนินการต่อ</span>
        <div id="loader" class="hidden flex gap-1 ml-2">
          <span class="loader-dot"></span>
          <span class="loader-dot"></span>
          <span class="loader-dot"></span>
        </div>
      </button>
    </div>

    <div id="message" class="mt-8 text-center text-[13px] font-medium min-h-[20px] transition-all"></div>

    <div class="mt-16 text-center">
      <p class="text-[12px] text-[#86868b]">ฝ่ายสนับสนุนเทคโนโลยีสารสนเทศ</p>
    </div>
  </div>

<script>
// ตรวจสอบ Session
if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
}

const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    if (!user || !pass) {
        showMessage("กรุณากรอกข้อมูลให้ครบถ้วน", "text-[#ff3b30]"); // Apple Red
        return;
    }

    // Start Loading
    btn.disabled = true;
    text.classList.add("hidden");
    loader.classList.remove("hidden");
    showMessage("", "");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await response.json();

        if (data.success) {
            showMessage("เข้าสู่ระบบสำเร็จ", "text-[#34c759]"); // Apple Green
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
        } else {
            showMessage(data.message || "ข้อมูลไม่ถูกต้อง", "text-[#ff3b30]");
            resetBtn();
        }
    } catch (e) {
        showMessage("เกิดข้อผิดพลาดในการเชื่อมต่อ", "text-[#ff3b30]");
        resetBtn();
    }
}

function showMessage(msg, colorClass) {
    const el = document.getElementById("message");
    el.innerText = msg;
    el.className = `mt-8 text-center text-[13px] font-medium min-h-[20px] ${colorClass}`;
}

function resetBtn() {
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");
    btn.disabled = false;
    text.classList.remove("hidden");
    loader.classList.add("hidden");
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
