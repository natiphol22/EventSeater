<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium Login | Company Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
    .bg-gradient {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    }
  </style>
</head>

<body class="bg-gradient h-screen flex items-center justify-center p-4">

  <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-white/50">
    
    <div class="text-center mb-10">
      <div class="flex justify-center mb-6">
        <img src="LOGO.png" alt="Company Logo" class="h-24 w-auto object-contain" onerror="this.style.display='none'; document.getElementById('logo-text').classList.remove('hidden');">
        <h1 id="logo-text" class="hidden text-3xl font-bold text-slate-800 tracking-tight">MY COMPANY</h1>
      </div>
      <p class="text-slate-500 font-light">เข้าสู่ระบบเพื่อดำเนินการต่อ</p>
    </div>

    <div class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2 ml-1">ชื่อผู้ใช้งาน</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
            <i class="fas fa-user"></i>
          </span>
          <input type="text" id="username" 
                 class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all duration-300" 
                 placeholder="Username">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2 ml-1">รหัสผ่าน</label>
        <div class="relative group">
          <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-blue-500 transition-colors">
            <i class="fas fa-lock"></i>
          </span>
          <input type="password" id="password" 
                 class="block w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:bg-white outline-none transition-all duration-300" 
                 placeholder="••••••••">
        </div>
      </div>

      <button onclick="handleLogin()" id="loginBtn"
              class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-black active:scale-[0.98] shadow-lg transition-all duration-300 flex items-center justify-center overflow-hidden relative">
        <span id="btnText" class="transition-all duration-300">เข้าสู่ระบบ</span>
        <div id="loader" class="hidden absolute flex items-center justify-center">
          <i class="fas fa-circle-notch animate-spin text-xl text-white"></i>
        </div>
      </button>
    </div>

    <div id="message" class="mt-6 text-center text-sm font-medium min-h-[40px] flex items-center justify-center px-4 rounded-xl transition-all duration-300"></div>

  </div>

<script>
// ตรวจสอบสถานะการ Login [cite: 25]
if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
}

const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

async function handleLogin() {
    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const loader = document.getElementById("loader");
    const btnText = document.getElementById("btnText");

    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    if (!username || !password) {
        showMessage("กรุณากรอกข้อมูลให้ครบถ้วน", "error");
        return;
    }

    // เริ่มสถานะ Loading [cite: 24, 43]
    toggleLoading(true);

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "login",
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (data.success) {
            showMessage("สำเร็จ! กำลังเข้าสู่ระบบ...", "success");
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        } else {
            showMessage(data.message || "Username หรือ Password ไม่ถูกต้อง", "error");
            toggleLoading(false);
        }

    } catch (error) {
        console.error("Login Error:", error);
        showMessage("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error");
        toggleLoading(false);
    }
}

function toggleLoading(isLoading) {
    const loginBtn = document.getElementById("loginBtn");
    const loader = document.getElementById("loader");
    const btnText = document.getElementById("btnText");

    if (isLoading) {
        loginBtn.disabled = true; // ป้องกันการกดซ้ำ 
        loader.classList.remove("hidden");
        btnText.classList.add("opacity-0", "translate-y-10");
        loginBtn.classList.add("opacity-90");
    } else {
        loginBtn.disabled = false;
        loader.classList.add("hidden");
        btnText.classList.remove("opacity-0", "translate-y-10");
        loginBtn.classList.remove("opacity-90");
    }
}

function showMessage(text, type) {
    const msgEl = document.getElementById("message");
    msgEl.innerText = text;
    // แยกสีตามสถานะ: แดง (Error), เขียว (Success) [cite: 24, 34, 43]
    if (type === "success") {
        msgEl.className = "mt-6 text-center text-sm font-medium py-3 px-4 rounded-xl text-green-600 bg-green-50 flex items-center justify-center";
    } else {
        msgEl.className = "mt-6 text-center text-sm font-medium py-3 px-4 rounded-xl text-red-500 bg-red-50 flex items-center justify-center";
    }
}

// รองรับการกด Enter [cite: 24]
document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
