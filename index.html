<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Premium Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', 'Kanit', sans-serif;
      background: #F8F9FB;
      overflow: hidden;
    }

    /* พื้นหลังนวลๆ แบบสตูดิโอ */
    .bg-gradient-soft {
      background: radial-gradient(at 0% 0%, rgba(219, 234, 254, 0.5) 0, transparent 50%), 
                  radial-gradient(at 100% 0%, rgba(245, 208, 254, 0.4) 0, transparent 50%);
    }

    /* Card ที่มีบาลานซ์และเงาแบบนุ่มที่สุด */
    .balance-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.03), 0 4px 6px -4px rgba(0, 0, 0, 0.01);
      border-radius: 32px;
      transition: all 0.5s ease;
    }

    /* Input ที่มีความสูงพอดีกับสายตา (Ideal Proportion) */
    .input-balance {
      height: 54px;
      background: #FFFFFF;
      border: 1.5px solid #F1F1F4;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-balance:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.06);
    }

    /* Loading Spinner แบบมินิมอล */
    .loading-spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body class="bg-gradient-soft h-screen flex items-center justify-center p-6">

  <div class="balance-card w-full max-w-[400px] p-10 md:p-12 text-center animate-in fade-in slide-in-from-bottom-4 duration-1000">
    
    <div class="mb-10">
      <img src="LOGO.png" alt="Logo" class="h-16 mx-auto object-contain transition-all hover:scale-105 duration-500" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
      <div id="alt-logo" class="hidden text-xl font-semibold tracking-widest text-gray-800">PORTAL</div>
    </div>

    <div class="space-y-4">
      <div class="relative text-left">
        <label class="text-[12px] font-semibold text-gray-400 ml-1 mb-1.5 block">ACCOUNT</label>
        <input type="text" id="username" 
               class="input-balance w-full px-5 rounded-2xl text-gray-800 outline-none placeholder:text-gray-300 font-normal" 
               placeholder="Username">
      </div>

      <div class="relative text-left">
        <label class="text-[12px] font-semibold text-gray-400 ml-1 mb-1.5 block">PASSWORD</label>
        <input type="password" id="password" 
               class="input-balance w-full px-5 rounded-2xl text-gray-800 outline-none placeholder:text-gray-300 font-normal" 
               placeholder="••••••••">
      </div>

      <button onclick="handleLogin()" id="loginBtn"
              class="w-full bg-[#1d1d1f] text-white font-medium h-[54px] rounded-2xl hover:bg-black active:scale-[0.98] transition-all duration-300 flex items-center justify-center mt-8 shadow-xl shadow-gray-200">
        <span id="btnText">Sign In</span>
        <div id="loader" class="hidden"><div class="loading-spinner"></div></div>
      </button>
    </div>

    <div id="message" class="mt-8 h-4 text-xs font-medium transition-all duration-300"></div>

    <div class="mt-10 pt-8 border-t border-gray-50">
        <p class="text-[10px] text-gray-300 uppercase tracking-[0.2em] font-medium">Internal Enterprise System</p>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    if (!user || !pass) {
        showMsg("กรุณากรอกข้อมูลให้ครบถ้วน", "text-amber-500");
        return;
    }

    // เปิดสถานะ Loading
    btn.disabled = true;
    text.classList.add("hidden");
    loader.classList.remove("hidden");
    showMsg("", "");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await response.json();

        if (data.success) {
            showMsg("กำลังเข้าสู่ระบบ...", "text-blue-500");
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
        } else {
            showMsg(data.message || "ข้อมูลไม่ถูกต้อง", "text-red-500");
            resetBtn();
        }
    } catch (e) {
        showMsg("เชื่อมต่อไม่สำเร็จ", "text-red-500");
        resetBtn();
    }
}

function showMsg(m, c) {
    const el = document.getElementById("message");
    el.innerText = m;
    el.className = `mt-8 h-4 text-xs font-medium ${c}`;
}

function resetBtn() {
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");
    btn.disabled = false;
    text.classList.remove("hidden");
    loader.classList.add("hidden");
}
</script>
</body>
</html>
