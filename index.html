<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elite Login Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', 'Kanit', sans-serif;
      background-color: #FBFBFD; /* Apple White */
      display: flex; align-items: center; justify-content: center; min-height: 100vh;
    }
    
    /* ดีไซน์เน้นความบาลานซ์ */
    .auth-card {
      background: white;
      padding: 3.5rem 3rem;
      border-radius: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.04);
      width: 100%; max-width: 420px;
      transition: all 0.3s ease;
    }

    .input-box {
      height: 56px;
      background: #F5F5F7;
      border: 1.5px solid transparent;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-box:focus {
      background: white;
      border-color: #0071E3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.1);
    }

    .btn-submit {
      height: 56px;
      background: #1D1D1F;
      color: white;
      border-radius: 18px;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-submit:hover:not(:disabled) { background: #000; transform: translateY(-1px); }
    .btn-submit:active { transform: scale(0.98); }

    /* Custom Loading */
    .loader-spin {
      width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="auth-card">
    <div class="text-center mb-12">
      <img src="LOGO.png" alt="Logo" class="h-14 mx-auto mb-6 object-contain" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
      <h1 id="alt-logo" class="hidden text-2xl font-bold mb-2">CubicPlus</h1>
      <h2 class="text-[22px] font-semibold text-[#1D1D1F] tracking-tight">เข้าสู่ระบบ</h2>
      <p class="text-[#86868B] text-sm mt-2">โปรดระบุบัญชีผู้ใช้ของคุณ</p>
    </div>

    <div class="space-y-4">
      <input type="text" id="username" 
             class="input-box w-full px-6 rounded-2xl outline-none placeholder:text-gray-400" 
             placeholder="ชื่อผู้ใช้งาน"
             onkeypress="checkEnter(event)">
      
      <input type="password" id="password" 
             class="input-box w-full px-6 rounded-2xl outline-none placeholder:text-gray-400" 
             placeholder="รหัสผ่าน"
             onkeypress="checkEnter(event)">

      <button onclick="handleLogin()" id="loginBtn" class="btn-submit w-full flex items-center justify-center mt-8">
        <span id="btnText">ดำเนินการต่อ</span>
        <div id="loader" class="hidden"><div class="loader-spin"></div></div>
      </button>
    </div>

    <div id="message" class="mt-8 text-center text-sm font-medium min-h-[20px] transition-all"></div>
    
    <p class="mt-12 text-center text-[11px] text-gray-300 font-medium tracking-widest uppercase">Internal Portal v2.0</p>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

// 1. ฟังก์ชันดักปุ่ม Enter (กดที่ไหนก็ได้ในช่อง Input)
function checkEnter(event) {
    if (event.key === "Enter") {
        handleLogin();
    }
}

async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    if (!user || !pass) {
        showMsg("กรุณากรอกข้อมูลให้ครบถ้วน", "text-red-500");
        return;
    }

    // Start Loading State
    btn.disabled = true;
    text.classList.add("hidden");
    loader.classList.remove("hidden");
    showMsg("", "");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await response.json();

        if (data.success) {
            showMsg("เข้าสู่ระบบสำเร็จ", "text-green-600");
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
        } else {
            showMsg(data.message || "บัญชีหรือรหัสผ่านไม่ถูกต้อง", "text-red-500");
            resetBtn();
        }
    } catch (e) {
        showMsg("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "text-red-500");
        resetBtn();
    }
}

function showMsg(m, c) {
    const el = document.getElementById("message");
    el.innerText = m;
    el.className = `mt-8 text-center text-sm font-medium ${c}`;
}

function resetBtn() {
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");
    btn.disabled = false;
    text.classList.remove("hidden");
    loader.classList.add("hidden");
}
</script>
</body>
</html>
