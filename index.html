<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', 'Kanit', sans-serif;
      background-color: #F9F9FB; /* สีพื้นหลังโทนสว่างที่ดูแพง */
    }
    .login-card {
      background: #FFFFFF;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
      border-radius: 32px;
    }
    .input-field {
      background: #F2F2F7;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }
    .input-field:focus {
      background: #FFFFFF;
      border-color: #007AFF;
      box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
    }
    /* Loading Dots Animation */
    .dot-flashing {
      position: relative;
      width: 6px;
      height: 6px;
      border-radius: 5px;
      background-color: #FFF;
      animation: dot-flashing 1s infinite linear alternate;
      animation-delay: .5s;
    }
    .dot-flashing::before, .dot-flashing::after {
      content: '';
      display: inline-block;
      position: absolute;
      top: 0;
    }
    .dot-flashing::before {
      left: -12px;
      width: 6px;
      height: 6px;
      border-radius: 5px;
      background-color: #FFF;
      animation: dot-flashing 1s infinite linear alternate;
      animation-delay: 0s;
    }
    .dot-flashing::after {
      left: 12px;
      width: 6px;
      height: 6px;
      border-radius: 5px;
      background-color: #FFF;
      animation: dot-flashing 1s infinite linear alternate;
      animation-delay: 1s;
    }
    @keyframes dot-flashing {
      0% { background-color: #FFF; }
      50%, 100% { background-color: rgba(255, 255, 255, 0.2); }
    }
  </style>
</head>

<body class="h-screen flex items-center justify-center p-6">

  <div class="login-card w-full max-w-[400px] p-10 md:p-12 animate-in fade-in duration-1000">
    
    <div class="text-center mb-10">
      <img src="LOGO.png" alt="Company Logo" class="h-20 mx-auto mb-8 object-contain transition-transform hover:scale-105 duration-500" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
      <div id="alt-logo" class="hidden text-2xl font-semibold tracking-tight text-gray-800 mb-8">PORTAL</div>
      <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">เข้าสู่ระบบ</h1>
      <p class="text-gray-400 text-sm mt-2 font-light">ระบุตัวตนของคุณเพื่อใช้งานระบบ</p>
    </div>

    <div class="space-y-4">
      <div class="relative">
        <input type="text" id="username" 
               class="input-field w-full px-5 py-4 rounded-2xl text-gray-900 outline-none placeholder:text-gray-400 text-sm font-medium" 
               placeholder="ชื่อผู้ใช้งาน">
      </div>

      <div class="relative">
        <input type="password" id="password" 
               class="input-field w-full px-5 py-4 rounded-2xl text-gray-900 outline-none placeholder:text-gray-400 text-sm font-medium" 
               placeholder="รหัสผ่าน">
      </div>

      <button onclick="handleLogin()" id="loginBtn"
              class="w-full bg-black text-white font-medium py-4 rounded-2xl hover:bg-gray-800 active:scale-[0.98] transition-all duration-300 flex items-center justify-center mt-8 h-[56px] shadow-lg shadow-gray-200">
        <span id="btnText">ดำเนินการต่อ</span>
        <div id="loader" class="hidden flex items-center justify-center ml-2">
            <div class="dot-flashing mx-4"></div>
        </div>
      </button>
    </div>

    <div id="message" class="mt-8 text-center text-[13px] font-medium min-h-[20px] transition-all duration-300"></div>

    <p class="mt-12 text-center text-[11px] text-gray-300 uppercase tracking-widest font-medium">Internal System Only</p>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

if (localStorage.getItem("user")) {
    window.location.href = "dashboard.html";
}

async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    if (!user || !pass) {
        showMessage("กรุณากรอกข้อมูลให้ครบถ้วน", "text-red-400");
        return;
    }

    // Start Loading UI
    btn.disabled = true;
    text.style.display = 'none';
    loader.classList.remove("hidden");
    showMessage("", "");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await response.json();

        if (data.success) {
            showMessage("ยืนยันตัวตนสำเร็จ", "text-green-500");
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 800);
        } else {
            showMessage(data.message || "ข้อมูลไม่ถูกต้อง", "text-red-400");
            resetBtn();
        }
    } catch (e) {
        showMessage("ไม่สามารถติดต่อเซิร์ฟเวอร์ได้", "text-red-400");
        resetBtn();
    }
}

function showMessage(msg, colorClass) {
    const el = document.getElementById("message");
    el.innerText = msg;
    el.className = `mt-8 text-center text-[13px] font-medium min-h-[20px] ${colorClass}`;
}

function resetBtn() {
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");
    btn.disabled = false;
    text.style.display = 'block';
    loader.classList.add("hidden");
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
