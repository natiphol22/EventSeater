<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Access Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Kanit:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', 'Kanit', sans-serif;
      background: radial-gradient(circle at top right, #ffffff, #f0f2f5);
      min-height: 100vh;
    }

    /* เงาแบบ Ambient Shadow ที่ฟุ้งและนุ่มนวลกว่าในรูป */
    .soft-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 
        0 10px 15px -3px rgba(0, 0, 0, 0.02),
        0 30px 60px -12px rgba(0, 0, 0, 0.05);
      border-radius: 40px;
    }

    /* Input ที่ดูเหมือนจมลงไปในพื้นผิว (Inner Shadow) */
    .input-premium {
      background: #f4f4f7;
      border: 1px solid transparent;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-premium:focus {
      background: #ffffff;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    /* ปุ่มแบบ Gradient ที่มีความลึก */
    .btn-premium {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
      transition: all 0.3s ease;
    }
    .btn-premium:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.4);
    }
    .btn-premium:active { transform: scale(0.97); }

    /* Custom Spinner */
    .loading-dot {
      width: 5px; height: 5px; background: white; border-radius: 50%;
      animation: bounce 0.6s infinite alternate;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { from { transform: translateY(0); opacity: 0.3; } to { transform: translateY(-8px); opacity: 1; } }
  </style>
</head>

<body class="flex items-center justify-center p-6">

  <div class="fixed top-[-10%] right-[-10%] w-[400px] h-[400px] bg-blue-100/50 rounded-full blur-[100px] z-[-1]"></div>
  <div class="fixed bottom-[-5%] left-[-5%] w-[300px] h-[300px] bg-purple-100/40 rounded-full blur-[80px] z-[-1]"></div>

  <div class="soft-card w-full max-w-[420px] p-10 md:p-14 animate-in fade-in zoom-in duration-700">
    
    <div class="text-center mb-10">
      <div class="inline-block p-2 rounded-3xl bg-white shadow-sm mb-6">
        <img src="LOGO.png" alt="Logo" class="h-16 w-auto object-contain transition-all hover:rotate-3" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
        <div id="alt-logo" class="hidden text-2xl font-bold text-gray-800 px-4">PORTAL</div>
      </div>
      <h2 class="text-2xl font-semibold text-gray-800 tracking-tight">ยินดีต้อนรับ</h2>
      <p class="text-gray-400 text-sm mt-2 font-light italic">Secure Identity Platform</p>
    </div>

    <div class="space-y-5">
      <div class="group">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2 block group-focus-within:text-blue-500 transition-colors">Username</label>
        <input type="text" id="username" 
               class="input-premium w-full px-6 py-4 rounded-2xl text-gray-800 outline-none placeholder:text-gray-300 font-medium" 
               placeholder="ชื่อผู้ใช้งาน">
      </div>

      <div class="group">
        <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-2 block group-focus-within:text-blue-500 transition-colors">Password</label>
        <input type="password" id="password" 
               class="input-premium w-full px-6 py-4 rounded-2xl text-gray-800 outline-none placeholder:text-gray-300 font-medium" 
               placeholder="••••••••">
      </div>

      <button onclick="handleLogin()" id="loginBtn"
              class="btn-premium w-full py-4 rounded-2xl text-white font-semibold tracking-wide flex items-center justify-center mt-8 h-[60px]">
        <span id="btnText">เข้าสู่ระบบ</span>
        <div id="loader" class="hidden flex gap-1.5 ml-3">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      </button>
    </div>

    <div id="message" class="mt-8 text-center text-sm font-medium min-h-[20px] transition-all duration-300"></div>

    <div class="mt-12 flex justify-center items-center gap-2">
      <span class="h-[1px] w-4 bg-gray-200"></span>
      <p class="text-[10px] text-gray-300 font-bold uppercase tracking-[0.2em]">CubicPlus Systems</p>
      <span class="h-[1px] w-4 bg-gray-200"></span>
    </div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_ANVi_o-r3uTNxOAy14Sz7iNH-Q7VghmT94IkyNDBAWKGudvkFXQOWsrlxgxSDi9LmQ/exec";

if (localStorage.getItem("user")) { window.location.href = "dashboard.html"; }

async function handleLogin() {
    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");

    if (!user || !pass) {
        showMsg("กรุณากรอกข้อมูลให้ครบถ้วน", "text-rose-500");
        return;
    }

    // Lock UI
    btn.disabled = true;
    text.classList.add("hidden");
    loader.classList.remove("hidden");
    showMsg("", "");

    try {
        const response = await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", username: user, password: pass })
        });
        const data = await response.json();

        if (data.success) {
            showMsg("สำเร็จ! กำลังพามือไป...", "text-blue-500");
            localStorage.setItem("user", JSON.stringify(data.user));
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
        } else {
            showMsg(data.message || "ข้อมูลไม่ถูกต้อง", "text-rose-500");
            resetBtn();
        }
    } catch (e) {
        showMsg("เกิดข้อผิดพลาดในการเชื่อมต่อ", "text-rose-500");
        resetBtn();
    }
}

function showMsg(m, c) {
    const el = document.getElementById("message");
    el.innerText = m;
    el.className = `mt-8 text-center text-sm font-medium ${c}`;
}

function resetBtn() {
    const btn = document.getElementById("loginBtn");
    const text = document.getElementById("btnText");
    const loader = document.getElementById("loader");
    btn.disabled = false;
    text.classList.remove("hidden");
    loader.classList.add("hidden");
}

document.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
